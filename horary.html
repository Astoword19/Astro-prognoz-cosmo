@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap');

<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.45/moment-timezone-with-data.min.js"></script>

<script type="module">

let swe = null;
const SE_SUN = 0, SE_MOON = 1, SE_MERCURY = 2, SE_VENUS = 3, SE_MARS = 4;
const SE_JUPITER = 5, SE_SATURN = 6, SE_URANUS = 7, SE_NEPTUNE = 8, SE_PLUTO = 9;
const SE_TRUE_NODE = 11, SE_MEAN_APOG = 12;
const SEFLG_SPEED = 256, SE_GREG_CAL = 1;

const SE_BODIES = {
  sun: SE_SUN, moon: SE_MOON, mercury: SE_MERCURY, venus: SE_VENUS,
  mars: SE_MARS, jupiter: SE_JUPITER, saturn: SE_SATURN,
  uranus: SE_URANUS, neptune: SE_NEPTUNE, pluto: SE_PLUTO,
  north_node: SE_TRUE_NODE, lilith: SE_MEAN_APOG
};

const SIGNS = ['Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];

const PLANET_NAMES = {
  sun:'Солнце', moon:'Луна', mercury:'Меркурий', venus:'Венера',
  mars:'Марс', jupiter:'Юпитер', saturn:'Сатурн', uranus:'Уран',
  neptune:'Нептун', pluto:'Плутон', north_node:'Сев.узел',
  south_node:'Юж.узел', lilith:'Лилит'
};

const SEPTENER = ['sun','moon','mercury','venus','mars','jupiter','saturn'];
const PLANET_ORDER = ['sun','moon','mercury','venus','mars','jupiter','saturn','uranus','neptune','pluto','north_node'];

// Птолемеевские аспекты с моэтическими орбами планет
const ASPECT_ANGLES = [0, 60, 90, 120, 180];
const ASPECT_NAMES = { 0:'Соединение', 60:'Секстиль', 90:'Квадратура', 120:'Тригон', 180:'Оппозиция' };

// Моэтические орбы (половина от полного орба планеты)
const PLANET_ORBS = {
  sun: 7.5, moon: 6, mercury: 3.5, venus: 3.5, mars: 3.5,
  jupiter: 4.5, saturn: 4.5, uranus: 2.5, neptune: 2.5, pluto: 2.5,
  north_node: 1.5, south_node: 1.5, lilith: 1.5
};

// Эссенциальные достоинства (управление и экзальтация)
const DIGNITIES = [
  { ruler:'mars',    exalt:'sun',    detri:'venus',   fall:'saturn'  }, // Овен
  { ruler:'venus',   exalt:'moon',   detri:'mars',    fall:null      }, // Телец
  { ruler:'mercury', exalt:null,     detri:'jupiter',  fall:null      }, // Близнецы
  { ruler:'moon',    exalt:'jupiter',detri:'saturn',   fall:'mars'    }, // Рак
  { ruler:'sun',     exalt:null,     detri:'saturn',   fall:null      }, // Лев
  { ruler:'mercury', exalt:'mercury',detri:'jupiter',  fall:'venus'   }, // Дева
  { ruler:'venus',   exalt:'saturn', detri:'mars',     fall:'sun'     }, // Весы
  { ruler:'mars',    exalt:null,     detri:'venus',    fall:'moon'    }, // Скорпион
  { ruler:'jupiter', exalt:null,     detri:'mercury',  fall:null      }, // Стрелец
  { ruler:'saturn',  exalt:'mars',   detri:'moon',     fall:'jupiter' }, // Козерог
  { ruler:'saturn',  exalt:null,     detri:'sun',      fall:null      }, // Водолей
  { ruler:'jupiter', exalt:'venus',  detri:'mercury',  fall:'mercury' }  // Рыбы
];

// Планетарные часы — последовательность Халдейского ряда
const CHALDEAN_ORDER = ['saturn','jupiter','mars','sun','venus','mercury','moon'];
// Управители дней недели (0=Вс, 1=Пн...)
const DAY_RULERS = ['sun','moon','mars','mercury','jupiter','venus','saturn'];

// ═══ УТИЛИТЫ ═══

function norm(d) { let r = d % 360; return r < 0 ? r + 360 : r; }
const toRad = d => d * Math.PI / 180;

function degToSign(deg) {
  if (isNaN(deg)) return { sign:'?', signIndex:0, degree:0, minute:0, second:0 };
  const d = norm(deg), idx = Math.floor(d / 30), rem = d % 30;
  return { sign: SIGNS[idx], signIndex: idx, degree: Math.floor(rem),
    minute: Math.floor((rem % 1) * 60), second: Math.floor(((rem % 1) * 60 % 1) * 60), absolute: d };
}

function fmtDeg(deg) {
  if (isNaN(deg)) return '—';
  const i = degToSign(deg);
  return `${i.degree}\u00B0${String(i.minute).padStart(2,'0')}' ${i.sign}`;
}

function houseOf(deg, cusps) {
  if (!cusps || cusps.length < 12 || isNaN(deg)) return 1;
  const d = norm(deg);
  for (let i = 0; i < 12; i++) {
    const s = cusps[i], e = cusps[(i + 1) % 12];
    if (s > e) { if (d >= s || d < e) return i + 1; }
    else       { if (d >= s && d < e) return i + 1; }
  }
  return 1;
}

// ═══ SWE ОБЁРТКИ ═══

function sweJulday(y, m, d, h) { return (swe.julday || swe.swe_julday).call(swe, y, m, d, h, SE_GREG_CAL); }

function sweCalcUt(jd, body) {
  const fn = swe.calc_ut || swe.swe_calc_ut;
  const r = fn.call(swe, jd, body, SEFLG_SPEED);
  
  // Диагностика первых вызовов
  if (body <= 1) console.log(`[SWE] calc_ut body=${body}: type=${typeof r}, keys=${r ? Object.keys(r) : 'null'}, val=${JSON.stringify(r)?.substring(0,300)}`);
  
  if (r && r.xx) return r.xx;
  if (r && r.data && Array.isArray(r.data)) {
    // Проверяем что data не все нули
    if (r.data.some(v => v !== 0)) return r.data;
  }
  if (Array.isArray(r)) return r;
  if (r && r.longitude !== undefined)
    return [r.longitude, r.latitude || 0, r.distance || 0, r.longitudeSpeed || r.speedLong || 0];
  // Попробуем достать числовые значения из объекта
  if (r && typeof r === 'object') {
    const vals = Object.values(r).filter(v => typeof v === 'number');
    if (vals.length >= 4) { console.log('[SWE] Extracted numeric values:', vals); return vals; }
  }
  // Попробуем другие методы как fallback
  for (const altName of ['swe_calc_ut', 'calc_ut', 'calc', 'swe_calc']) {
    if (typeof swe[altName] === 'function' && swe[altName] !== fn) {
      try {
        const r2 = swe[altName](jd, body, SEFLG_SPEED);
        if (body <= 1) console.log(`[SWE] fallback ${altName}:`, JSON.stringify(r2)?.substring(0,300));
        if (r2 && r2.xx) return r2.xx;
        if (r2 && r2.data && Array.isArray(r2.data) && r2.data.some(v => v !== 0)) return r2.data;
        if (Array.isArray(r2) && r2.some(v => v !== 0)) return r2;
        if (r2 && r2.longitude !== undefined && r2.longitude !== 0) return [r2.longitude, r2.latitude||0, r2.distance||0, r2.longitudeSpeed||0];
      } catch(e) { console.log(`[SWE] fallback ${altName} error:`, e.message); }
    }
  }
  console.warn('[SWE] ALL methods returned zeros for body=' + body);
  return [0, 0, 0, 0];
}

function sweHouses(jd, lat, lon, sys) {
  const hsys = typeof sys === 'string' ? sys.charCodeAt(0) : sys;
  const r = (swe.houses || swe.swe_houses).call(swe, jd, lat, lon, hsys);
  let cusps = [], ascmc = [];
  if (r) {
    cusps = r.cusps || r.house || r.houses || (r.data && (r.data.houses || r.data.cusps)) || [];
    ascmc = r.ascmc || r.points || (r.data && (r.data.ascmc || r.data.points)) || [];
    if (Array.isArray(r) && r.length === 2) { cusps = r[0]; ascmc = r[1]; }
  }
  if (cusps.length === 13) cusps = cusps.slice(1);
  return { cusps, ascmc };
}

function localToUTC(year, month, day, hour, minute, tz) {
  const ds = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;
  const cleanTz = String(tz||'').trim();
  let loc;
  const isOff = /^[-+]?\d+(\.\d+)?$/.test(cleanTz) || /^[-+]?\d{1,2}:\d{2}$/.test(cleanTz);
  if (isOff) loc = moment(ds, 'YYYY-MM-DD HH:mm').utcOffset(parseFloat(cleanTz), true);
  else loc = moment.tz(ds, 'YYYY-MM-DD HH:mm', cleanTz);
  if (!loc.isValid()) throw new Error('Невалидная дата/пояс: ' + ds + ' / ' + cleanTz);
  const off = loc.utcOffset() / 60;
  let abbr = loc.format('z');
  if (isOff) abbr = 'UTC' + (off >= 0 ? '+' : '') + off;
  const u = loc.clone().utc();
  return { year: u.year(), month: u.month()+1, day: u.date(), hour: u.hour(), minute: u.minute(), second: u.second(), utcOffset: off, tzAbbr: abbr };
}

// ═══ РАСЧЁТЫ ═══

function calcPositions(jd) {
  const pos = {};
  for (const [name, code] of Object.entries(SE_BODIES)) {
    const data = sweCalcUt(jd, code);
    pos[name] = { longitude: norm(data[0]), speed: data[3] || 0, retrograde: (data[3] || 0) < 0 };
  }
  if (pos.north_node) {
    pos.north_node.retrograde = true;
    pos.south_node = { longitude: norm(pos.north_node.longitude + 180), retrograde: true, speed: -(pos.north_node.speed || 0) };
  }
  return pos;
}

function calcAllHouses(jd, lat, lon) {
  const { cusps, ascmc } = sweHouses(jd, lat, lon, 'R'); // Региомонтан
  const asc = (!isNaN(ascmc[0])) ? ascmc[0] : 0;
  const mc  = (!isNaN(ascmc[1])) ? ascmc[1] : 0;
  let fc = cusps;
  if (fc.length < 12 && asc) { fc = []; for (let i = 0; i < 12; i++) fc.push(norm(asc + i * 30)); }
  return { cusps: fc, asc: norm(asc), mc: norm(mc) };
}

// Аспекты с моэтическими орбами
function calcAspects(pos) {
  const asp = [], keys = Object.keys(pos);
  for (let i = 0; i < keys.length; i++) for (let j = i+1; j < keys.length; j++) {
    const k1 = keys[i], k2 = keys[j];
    if (!pos[k1] || !pos[k2] || isNaN(pos[k1].longitude) || isNaN(pos[k2].longitude)) continue;
    let d = Math.abs(pos[k1].longitude - pos[k2].longitude); if (d > 180) d = 360 - d;
    const orb1 = PLANET_ORBS[k1] || 2, orb2 = PLANET_ORBS[k2] || 2;
    const maxOrb = (orb1 + orb2) / 2; // Среднее моэтических половин
    for (const angle of ASPECT_ANGLES) {
      const o = Math.abs(d - angle);
      if (o <= maxOrb) {
        const s1 = pos[k1].speed||0, s2 = pos[k2].speed||0, sd = s1 - s2;
        let ap = null;
        if (d < angle) ap = sd > 0 ? false : true; else ap = sd > 0 ? true : false;
        asp.push({ planet1:k1, planet2:k2, type: ASPECT_NAMES[angle], angle, orb: o.toFixed(2), applying: ap });
      }
    }
  }
  return asp.sort((a,b) => parseFloat(a.orb) - parseFloat(b.orb));
}

// ═══ ХОРАРНЫЕ ФУНКЦИИ ═══

// Управитель дома
function getHouseRuler(houseNum, cusps) {
  if (!cusps || cusps.length < 12) return null;
  const cuspDeg = cusps[houseNum - 1];
  const si = degToSign(cuspDeg);
  const dig = DIGNITIES[si.signIndex];
  return { house: houseNum, sign: si.sign, cuspDeg, rulerKey: dig.ruler, rulerName: PLANET_NAMES[dig.ruler] };
}

// Эссенциальные достоинства
function getPlanetDignity(planetKey, deg) {
  if (isNaN(deg)) return [];
  const si = degToSign(deg);
  const d = DIGNITIES[si.signIndex];
  const st = [];
  if (d.ruler === planetKey) st.push('Обитель');
  if (d.exalt === planetKey) st.push('Экзальтация');
  if (d.detri === planetKey) st.push('Изгнание');
  if (d.fall === planetKey) st.push('Падение');
  return st;
}

function getDignityText(planetKey, deg) {
  const d = getPlanetDignity(planetKey, deg);
  return d.length ? d.join(', ') : 'Перегрин';
}

// Сожжение / Казими / Под лучами
function getCombustion(planetKey, sunLon, planetLon) {
  if (planetKey === 'sun') return null;
  let d = Math.abs(sunLon - planetLon); if (d > 180) d = 360 - d;
  if (d <= 0.283) return 'Казими (в сердце Солнца)'; // 0°17'
  if (d <= 8.5) return 'Сожжённая'; // 8°30'
  if (d <= 17) return 'Под лучами';
  return null;
}

// Антисы
function calcAntiscion(deg) { return norm(180 - deg + 180); } // Зеркало по 0° Рака / 0° Козерога = 360 - deg
function calcContraAntiscion(deg) { return norm(360 - deg); } // = 180° от антиса

// Рецепция
function checkReception(p1Key, p1Deg, p2Key, p2Deg) {
  if (isNaN(p1Deg) || isNaN(p2Deg)) return null;
  const s1 = degToSign(p1Deg), s2 = degToSign(p2Deg);
  const d1 = DIGNITIES[s1.signIndex], d2 = DIGNITIES[s2.signIndex];
  let p1in2 = null, p2in1 = null;
  if (d1.ruler === p2Key) p1in2 = 'управлению';
  else if (d1.exalt === p2Key) p1in2 = 'экзальтации';
  if (d2.ruler === p1Key) p2in1 = 'управлению';
  else if (d2.exalt === p1Key) p2in1 = 'экзальтации';
  if (p1in2 && p2in1) {
    return p1in2 === p2in1 ? `Взаимная рецепция по ${p1in2}` : `Смешанная рецепция (${p1in2} / ${p2in1})`;
  }
  return null;
}

// Луна без курса (итерационный метод — двигаем Луну вперёд)
function isMoonVOC(jd) {
  const moonData = sweCalcUt(jd, SE_MOON);
  const moonLon = norm(moonData[0]);
  const moonSign = Math.floor(moonLon / 30);
  const moonSpeed = moonData[3] || 13;
  // Сколько градусов до конца знака
  const degToEnd = 30 - (moonLon % 30);
  // Приблизительно дней до конца знака
  const daysToEnd = degToEnd / Math.abs(moonSpeed);
  // Проверяем с шагом 0.02 дня (~30 мин)
  const step = 0.02;
  for (let dt = step; dt <= daysToEnd + step; dt += step) {
    const futureJd = jd + dt;
    const futureMoon = sweCalcUt(futureJd, SE_MOON);
    const futureLon = norm(futureMoon[0]);
    const futureSign = Math.floor(futureLon / 30);
    // Луна вышла из знака — остановка
    if (futureSign !== moonSign) break;
    // Проверяем аспекты к септенеру
    for (const pk of ['sun','mercury','venus','mars','jupiter','saturn']) {
      const pData = sweCalcUt(futureJd, SE_BODIES[pk]);
      const pLon = norm(pData[0]);
      let diff = Math.abs(futureLon - pLon); if (diff > 180) diff = 360 - diff;
      for (const angle of ASPECT_ANGLES) {
        if (Math.abs(diff - angle) < 0.5) return false; // Найден точный аспект
      }
    }
  }
  return true; // Не найдено ни одного аспекта до конца знака
}

// Последний и следующий аспект Луны
function getMoonLastNext(jd, pos) {
  const moonLon = pos.moon.longitude;
  const moonSpeed = pos.moon.speed || 13;
  let lastAsp = null, nextAsp = null;
  // Ищем назад (до 3 дней) и вперёд (до 3 дней)
  for (const dir of [-1, 1]) {
    const step = 0.01 * dir;
    const limit = 3 * Math.abs(dir);
    let prevDiffs = {};
    for (let dt = step; Math.abs(dt) <= limit; dt += step) {
      const fJd = jd + dt;
      const fMoon = norm(sweCalcUt(fJd, SE_MOON)[0]);
      for (const pk of SEPTENER) {
        if (pk === 'moon') continue;
        const pLon = norm(sweCalcUt(fJd, SE_BODIES[pk])[0]);
        let diff = Math.abs(fMoon - pLon); if (diff > 180) diff = 360 - diff;
        for (const angle of ASPECT_ANGLES) {
          const orb = Math.abs(diff - angle);
          const key = pk + '_' + angle;
          if (orb < 0.3) {
            if (dir === -1 && !lastAsp) lastAsp = { planet: pk, type: ASPECT_NAMES[angle], dt: Math.abs(dt) };
            if (dir === 1 && !nextAsp) nextAsp = { planet: pk, type: ASPECT_NAMES[angle], dt: Math.abs(dt) };
          }
        }
        if ((dir === -1 && lastAsp) || (dir === 1 && nextAsp)) break;
      }
      if ((dir === -1 && lastAsp) || (dir === 1 && nextAsp)) break;
    }
  }
  return { last: lastAsp, next: nextAsp };
}

// Планетарный час
function getPlanetaryHour(localMoment, lat, lon) {
  // Упрощённый расчёт восхода/захода по формуле
  const dayOfWeek = localMoment.day(); // 0=Вс
  const dayRuler = DAY_RULERS[dayOfWeek];
  const dayRulerIdx = CHALDEAN_ORDER.indexOf(dayRuler);

  // Расчёт длительности дня/ночи (приближённо)
  const dayOfYear = localMoment.dayOfYear();
  const decl = 23.44 * Math.sin(toRad((360 / 365) * (dayOfYear + 284)));
  const latRad = toRad(lat);
  const declRad = toRad(decl);
  let cosHA = -Math.tan(latRad) * Math.tan(declRad);
  cosHA = Math.max(-1, Math.min(1, cosHA));
  const HA = Math.acos(cosHA) * 180 / Math.PI; // В градусах
  const sunriseHour = 12 - HA / 15;
  const sunsetHour = 12 + HA / 15;

  const currentHour = localMoment.hours() + localMoment.minutes() / 60;
  let hourIndex, isDay;

  if (currentHour >= sunriseHour && currentHour < sunsetHour) {
    // Дневной час
    isDay = true;
    const dayLength = sunsetHour - sunriseHour;
    const planetaryHourLen = dayLength / 12;
    hourIndex = Math.floor((currentHour - sunriseHour) / planetaryHourLen);
  } else {
    // Ночной час
    isDay = false;
    const nightLength = 24 - (sunsetHour - sunriseHour);
    const planetaryHourLen = nightLength / 12;
    let nightElapsed;
    if (currentHour >= sunsetHour) nightElapsed = currentHour - sunsetHour;
    else nightElapsed = (24 - sunsetHour) + currentHour;
    hourIndex = Math.floor(nightElapsed / planetaryHourLen);
  }

  hourIndex = Math.min(hourIndex, 11);

  // Халдейский порядок от управителя дня
  const totalOffset = isDay ? hourIndex : hourIndex + 12;
  const planetIdx = (dayRulerIdx + totalOffset) % 7;
  const hourRuler = CHALDEAN_ORDER[planetIdx];

  return { hourRuler, hourRulerName: PLANET_NAMES[hourRuler], dayRuler, dayRulerName: PLANET_NAMES[dayRuler], hourNum: hourIndex + 1, isDay };
}

// Радикальность карты
function checkRadicality(hourRuler, ascRulerKey, cusps) {
  const reasons = [];
  const ascSign = Math.floor(norm(cusps[0]) / 30);
  // 1. Управитель часа = управитель ASC
  if (hourRuler === ascRulerKey) reasons.push('Управитель планетарного часа совпадает с управителем ASC');
  // 2. Управитель часа той же стихии/триплицитета что и ASC
  const hourSign = null; // не применимо напрямую
  // 3. Ранние/поздние градусы ASC
  const ascDegInSign = cusps[0] % 30;
  if (ascDegInSign < 3) reasons.push('ВНИМАНИЕ: ASC в первых 3° знака — вопрос может быть задан слишком рано');
  if (ascDegInSign > 27) reasons.push('ВНИМАНИЕ: ASC в последних 3° знака — вопрос может быть задан слишком поздно или ситуация уже решена');
  // 4. Сатурн в 7 доме (препятствие для астролога)
  // будет проверено в calculate

  const isRadical = reasons.some(r => r.startsWith('Управитель'));
  return { isRadical, reasons };
}

// Поиск вердикта
function findVerdict(aspects, querentKey, quesitedKey) {
  const mainAsp = aspects.find(a =>
    a.applying === true &&
    ((a.planet1 === querentKey && a.planet2 === quesitedKey) || (a.planet1 === quesitedKey && a.planet2 === querentKey))
  );
  const moonAsp = aspects.find(a =>
    a.applying === true &&
    ((a.planet1 === 'moon' && a.planet2 === quesitedKey) || (a.planet1 === quesitedKey && a.planet2 === 'moon'))
  );
  return { mainAsp, moonAsp };
}

  if (v.mainAsp) {

  });

  // Антисы (только септенер)
  L.push(''); L.push('────────── АНТИСЫ (СЕПТЕНЕР) ──────────'); L.push('');
  SEPTENER.forEach(k => {
    const p = pos[k]; if (!p) return;
    const anti = norm(180 - (p.longitude % 360) + 180);
    // Правильная формула антиса: зеркало по оси 0° Рак — 0° Козерог
    // Антис = (знак Рака начало = 90°) — нет, проще:  антис lon = 180 - lon + 180 = 360 - lon? Нет.
    // Формула: антис = abs_diff от оси Рак/Козерог. Точная: antiscion = norm(180 - lon % 360 ... )
    // Правильно: antiscion(lon) = (180 - lon) нормализованный, если lon < 180; иначе (540 - lon)
    // Проще всего: antiscion = norm( (0 + 180) - lon + 0 ) нет...
    // Правильная формула антиса: для долготы L, антис = 360° − L + 0° = ... нет
    // Antiscion: отражение относительно оси 0°Cancer(90°)–0°Capricorn(270°)
    // Formula: antiscion_lon = norm(180 - lon)  -- НЕТ, это контра-антис
    // ПРАВИЛЬНО: antiscion(lon) = norm(180 - (lon - 90) + 90) = norm(360 - lon) -- нет!!
    // OK: Cancer axis (90°). Mirror: antiscion = 2*90 - lon = 180 - lon. Normalize.
    // Пример: Sun at 10° Gemini (70°) → antiscion = 180 - 70 = 110° = 20° Cancer. ✓
    const antiscion = norm(180 - p.longitude);
    L.push(`${PLANET_NAMES[k]}: антис ${fmtDeg(antiscion)}`);
  });

  L.push(''); L.push('══════════════════════════════════════');
  return L.join('\n');
}

window.calculate = function() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';
  if (!swe) { errEl.textContent = 'Swiss Ephemeris загружается...'; return; }

  const btn = document.getElementById('calcBtn');
  btn.disabled = true; btn.textContent = 'РАСЧЁТ...';

  try {
    const questionVal = document.getElementById('questionText').value.trim();
    const quesitedHouse = parseInt(document.getElementById('quesitedHouse').value, 10);
    const dateVal = document.getElementById('date').value;
    const timeVal = document.getElementById('time').value;
    const latVal = document.getElementById('lat').value;
    const lonVal = document.getElementById('lon').value;
    const tzVal = document.getElementById('tz').value;
    const city = document.getElementById('city').value;

    if (!dateVal || !timeVal || !latVal || !lonVal || !tzVal) {
      throw new Error('Заполните время и выберите город.');
    }

    const [year, month, day] = dateVal.split('-').map(Number);
    const [hour, minute] = timeVal.split(':').map(Number);
    const lat = parseFloat(latVal), lon = parseFloat(lonVal);

    const u = localToUTC(year, month, day, hour, minute, tzVal);
    const jd = sweJulday(u.year, u.month, u.day, u.hour + u.minute/60 + u.second/3600);

    const pos = calcPositions(jd);
    const houses = calcAllHouses(jd, lat, lon);
    const asp = calcAspects(pos);

    // Хорарные расчёты
    const ascRuler = getHouseRuler(1, houses.cusps);
    const quesitedRuler = getHouseRuler(quesitedHouse, houses.cusps);
    const moonVOC = isMoonVOC(jd);
    const moonAspects = getMoonLastNext(jd, pos);

    // Рецепция
    let reception = null;
    if (ascRuler && quesitedRuler && ascRuler.rulerKey !== quesitedRuler.rulerKey) {
      reception = checkReception(ascRuler.rulerKey, pos[ascRuler.rulerKey].longitude, quesitedRuler.rulerKey, pos[quesitedRuler.rulerKey].longitude);
    }

    // Планетарный час
    const localMoment = moment.tz(`${dateVal} ${timeVal}`, 'YYYY-MM-DD HH:mm', tzVal);
    const planetaryHour = getPlanetaryHour(localMoment, lat, lon);

    // Радикальность
    const radical = checkRadicality(planetaryHour.hourRuler, ascRuler.rulerKey, houses.cusps);

    // Сатурн в 7 доме
    const saturn7 = pos.saturn ? houseOf(pos.saturn.longitude, houses.cusps) === 7 : false;

    // Вердикт
    const verdict = findVerdict(asp, ascRuler.rulerKey, quesitedRuler.rulerKey);

    const inp = {
      question: questionVal, quesitedHouse,
      date: dateVal, time: timeVal,
      lat, lon, city: city || ''
    };

    const data = {
      input: inp, pos, houses, aspects: asp, utcInfo: u,
      horary: { ascRuler, quesitedRuler, moonVOC, moonAspects, reception, planetaryHour, radical, saturn7, verdict }
    };

    document.getElementById('output').value = genText(data);
    document.getElementById('resultBlock').style.display = 'block';
  } catch(e) {
    console.error(e);
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false; btn.textContent = 'РАССЧИТАТЬ ХОРАР';
  }
};

window.copyText = function() {
  const ta = document.getElementById('output');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '\u2713 Скопировано'; btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = '\u2398 Копировать'; btn.className = 'copy-btn'; }, 2500);
  });
};

window.setNow = function() {
  const now = new Date();
  document.getElementById('date').value = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  document.getElementById('time').value = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const btn = document.getElementById('btnNow');
  btn.classList.add('active');
  btn.textContent = '✓ Время засечено — ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  setTimeout(() => { btn.textContent = '⏱ Засечь текущее время'; btn.classList.remove('active'); }, 3000);
};

// Автозаполнение текущим временем
document.addEventListener('DOMContentLoaded', () => { window.setNow(); });

// ═══ ПОИСК ГОРОДОВ ═══

let tid;
const cityInput = document.getElementById('city');
cityInput.addEventListener('input', function() {
  clearTimeout(tid); closeAllLists();
  const val = this.value; if (!val || val.length < 2) return;
  tid = setTimeout(async () => {
    try {
      const resp = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(val)}&count=5&language=ru&format=json`);
      const data = await resp.json(); if (!data.results) return;
      const list = document.createElement('DIV'); list.className = 'autocomplete-items';
      cityInput.parentNode.appendChild(list);
      data.results.forEach(c => {
        const item = document.createElement('DIV');
        const region = c.admin1 ? `, ${c.admin1}` : '';
        const country = c.country ? ` (${c.country})` : '';
        const tz = c.timezone || 'UTC';
        item.innerHTML = `<span class="city-name">${c.name}</span><span class="city-region">${region}${country}</span><span class="city-tz">${tz}</span>`;
        item.addEventListener('click', () => {
          cityInput.value = c.name;
          document.getElementById('lat').value = c.latitude;
          document.getElementById('lon').value = c.longitude;
          document.getElementById('tz').value = tz;
          closeAllLists();
        });
        list.appendChild(item);
      });
    } catch(e) { console.error(e); }
  }, 400);
});

function closeAllLists(el) { document.querySelectorAll('.autocomplete-items').forEach(x => { if (el !== x && el !== cityInput) x.remove(); }); }
document.addEventListener('click', e => closeAllLists(e.target));

initSWE();
</script>
