  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@400;500;600&display=swap');

  .out-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .out-title { font-size: 12px; color: #cba77b; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }
  .copy-btn { padding: 8px 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #f1f5f9; font-size: 12px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { background: rgba(255,255,255,0.1); }
  .copy-btn.copied { background: #4ade80; color: #0d0e12; border-color: #4ade80; }
  textarea { width: 100%; padding: 24px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.04); border-radius: 8px; color: #e2e8f0; font-family: 'IBM Plex Mono', monospace; font-size: 13px; line-height: 1.8; resize: vertical; outline: none; }
  .empty { background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; margin-bottom: 24px; text-align: center; box-shadow: none; }
  .empty-icon { font-size: 42px; color: #cba77b; margin-bottom: 16px; opacity: 0.6; letter-spacing: 8px; }
  .error { color: #f87171; margin-top: 12px; font-size: 12px; text-align: center; }
  .tz-hint { font-size: 11px; color: #64748b; margin-top: 6px; }
  .footer { padding: 16px 16px 40px; font-size: 12px; color: #475569; text-align: center; border-top: none; }
  .footer p { margin-bottom: 4px; }
  .autocomplete { position: relative; }
  .autocomplete-items { position: absolute; z-index: 99; top: calc(100% + 6px); left: 0; right: 0; background: #181a20; border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; overflow-y: auto; max-height: 250px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
  .autocomplete-items div { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e2e8f0; transition: background 0.2s; }
  .autocomplete-items div:last-child { border-bottom: none; }
  .autocomplete-items div:hover { background-color: rgba(203,167,123,0.08); color: #fff; }
  .city-name { font-weight: 500; font-size: 14px; color: #fff; }
  .city-region { font-size: 12px; color: #64748b; margin-left: 6px; }
  .city-tz { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: #475569; margin-top: 4px; }
  .tz-select { display: flex; gap: 10px; align-items: center; }
  .tz-select select { max-width: 200px; }

<body>

<div class="wrap"><div class="header"><div class="header-inner">
  <div><h1>Транзиты → планеты</h1><p class="sub">Swiss Ephemeris (WASM) — положения на выбранную дату</p></div>
  <div class="nav-wrap">
    <span class="status loading" id="sweStatus">загрузка...</span>
    <a href="index.html" class="nav-btn">← Натальная</a>
    <a href="natal-transits.html" class="nav-btn">Н+Транзиты</a>

  </div>
</div></div></div>

<div class="wrap form-wrap">
  <div class="grid">
    <div><label>Дата</label><input type="date" id="date"></div>
    <div><label>Время</label><input type="time" id="time" value="12:00"></div>
    <div class="full">
      <label>Часовой пояс (UTC)</label>
      <select id="tz">
        <option value="-12">UTC-12</option><option value="-11">UTC-11</option>
        <option value="-10">UTC-10</option><option value="-9">UTC-9</option>
        <option value="-8">UTC-8</option><option value="-7">UTC-7</option>
        <option value="-6">UTC-6</option><option value="-5">UTC-5</option>
        <option value="-4">UTC-4</option><option value="-3">UTC-3</option>
        <option value="-2">UTC-2</option><option value="-1">UTC-1</option>
        <option value="0">UTC+0</option><option value="1">UTC+1</option>
        <option value="2">UTC+2</option><option value="3" selected>UTC+3 (Москва)</option>
        <option value="4">UTC+4</option><option value="5">UTC+5</option>
        <option value="6">UTC+6</option><option value="7">UTC+7</option>
        <option value="8">UTC+8</option><option value="9">UTC+9</option>
        <option value="10">UTC+10</option><option value="11">UTC+11</option>
        <option value="12">UTC+12</option>
      </select>
    </div>
  </div>
  <button class="btn" id="calcBtn" onclick="window.calculate()">РАССЧИТАТЬ</button>
  <div id="error" class="error"></div>
</div>

<div class="wrap" id="resultBlock" style="display:none;">
  <div class="out-wrap">
    <div class="out-head">
      <span class="out-title">Положения планет</span>
      <button class="copy-btn" id="copyBtn" onclick="window.copyText()">⎘ Копировать</button>
    </div>
    <textarea id="output" rows="35" readonly></textarea>
  </div>
</div>

<div class="wrap"><div class="footer">
  <p>Swiss Ephemeris (WebAssembly) — точность ±0.001°</p>
  <p>moment-timezone — историческая база часовых поясов IANA/Olson</p>
</div></div>

<script type="module">

let swe = null;
const SE_GREG_CAL = 1;
const SEFLG_SPEED = 256;

const BODIES = [
  { key: 'sun',    id: 0,  name: 'Солнце' },
  { key: 'moon',   id: 1,  name: 'Луна' },
  { key: 'mercury', id: 2, name: 'Меркурий' },
  { key: 'venus',  id: 3,  name: 'Венера' },
  { key: 'mars',   id: 4,  name: 'Марс' },
  { key: 'jupiter', id: 5, name: 'Юпитер' },
  { key: 'saturn', id: 6,  name: 'Сатурн' },
  { key: 'uranus', id: 7,  name: 'Уран' },
  { key: 'neptune', id: 8, name: 'Нептун' },
  { key: 'pluto',  id: 9,  name: 'Плутон' },
  { key: 'north_node', id: 11, name: 'Сев. узел (Раху)' },
  { key: 'lilith', id: 12, name: 'Лилит (Черная Луна)' },
  { key: 'chiron', id: 15, name: 'Хирон' },
];

const SIGNS = ['Овен','Телец','Близнецы','Рак','Лев','Дева',
               'Весы','Скорпион','Стрелец','Козерог','Водолей','Рыбы'];

const ASPECT_DEFS = [
  { name: 'Соединение',  angle: 0,   orb: 8, sym: '☌' },
  { name: 'Секстиль',    angle: 60,  orb: 5, sym: '⚹' },
  { name: 'Квадратура',  angle: 90,  orb: 7, sym: '□' },
  { name: 'Тригон',      angle: 120, orb: 7, sym: '△' },
  { name: 'Оппозиция',   angle: 180, orb: 8, sym: '☍' },
];

function norm(d) { let r = d % 360; return r < 0 ? r + 360 : r; }

function fmtDeg(deg) {
  const d = norm(deg);
  const idx = Math.floor(d / 30), rem = d % 30;
  const dd = Math.floor(rem), mm = Math.floor((rem % 1) * 60), ss = Math.floor(((rem % 1) * 60 % 1) * 60);
  return `${dd}\u00B0${String(mm).padStart(2,'0')}'${String(ss).padStart(2,'0')}" ${SIGNS[idx]}`;
}

function sweCalcUt(jd, body) {
  const fn = swe.calc_ut || swe.swe_calc_ut;
  const r = fn.call(swe, jd, body, SEFLG_SPEED);
  if (r && r.data && Array.isArray(r.data)) return r.data;
  if (r && r.xx) return r.xx;
  if (Array.isArray(r)) return r;
  if (r && r.longitude !== undefined)
    return [r.longitude, r.latitude || 0, r.distance || 0, r.longitudeSpeed || r.speedLong || 0];
  if (r && typeof r === 'object') {
    const vals = Object.values(r).filter(v => typeof v === 'number');
    if (vals.length >= 4) return vals;
  }
  return [0, 0, 0, 0];
}

// Селена (Белая Луна)
function calcSelena(jd) {
  return norm(242.606 + 0.14084795 * (jd - 2451545.0));
}

async function initSWE() {
  const el = document.getElementById('sweStatus');
  try {
    const mod = await import('https://cdn.jsdelivr.net/gh/prolaxu/swisseph-wasm@main/src/swisseph.js');
    const SwissEph = mod.default || mod;
    swe = new SwissEph();
    await swe.initSwissEph();
    el.textContent = 'готово'; el.className = 'status ok';
  } catch(e) {
    console.error('[SWE] Init failed:', e);
    el.textContent = 'ошибка'; el.className = 'status err';
  }
}

// Установить сегодняшнюю дату
const today = new Date();
document.getElementById('date').value = today.toISOString().split('T')[0];

window.calculate = function() {
  const errEl = document.getElementById('error');
  errEl.textContent = '';
  if (!swe) { errEl.textContent = 'Swiss Ephemeris ещё загружается...'; return; }

  const dateVal = document.getElementById('date').value;
  const timeVal = document.getElementById('time').value;
  const tzOffset = parseInt(document.getElementById('tz').value);
  if (!dateVal || !timeVal) { errEl.textContent = 'Укажите дату и время.'; return; }

  const [year, month, day] = dateVal.split('-').map(Number);
  const [hour, minute] = timeVal.split(':').map(Number);

  // Перевод в UTC
  const utcHour = hour - tzOffset + minute / 60;
  let utcDay = day, utcMonth = month, utcYear = year;
  let h = utcHour;
  if (h < 0) { h += 24; utcDay--; }
  if (h >= 24) { h -= 24; utcDay++; }
  // Простая коррекция дня (без полного календаря — достаточно для JD)

  const jdFn = swe.julday || swe.swe_julday;
  const jd = jdFn.call(swe, utcYear, utcMonth, utcDay, h, SE_GREG_CAL);

  const L = [];
  const tzStr = (tzOffset >= 0 ? '+' : '') + tzOffset;

  L.push('══════════ ТРАНЗИТЫ ══════════');
  L.push('');
  L.push(`Дата: ${dateVal}`);
  L.push(`Время: ${timeVal} (UTC${tzStr})`);
  L.push('');
  L.push('────────── ПОЛОЖЕНИЯ ПЛАНЕТ ──────────');
  L.push('');

  const positions = [];

  for (const b of BODIES) {
    const data = sweCalcUt(jd, b.id);
    const lon = norm(data[0]);
    const speed = data[3] || 0;
    const retro = speed < 0 ? ' (R)' : '';
    positions.push({ name: b.name, lon, speed });
    L.push(`${b.name}: ${fmtDeg(lon)}${retro}`);
  }

  // Южный узел
  const rahuPos = positions.find(p => p.name === 'Сев. узел (Раху)');
  if (rahuPos) {
    const ketuLon = norm(rahuPos.lon + 180);
    positions.push({ name: 'Юж. узел (Кету)', lon: ketuLon, speed: 0 });
    L.push(`Юж. узел (Кету): ${fmtDeg(ketuLon)} (R)`);
  }

  // Селена
  const selenaLon = calcSelena(jd);
  positions.push({ name: 'Селена (Белая Луна)', lon: selenaLon, speed: 0 });
  L.push(`Селена (Белая Луна): ${fmtDeg(selenaLon)}`);

  // Аспекты между транзитными планетами
  L.push('');
  L.push('────────── АСПЕКТЫ ──────────');
  L.push('');

  const aspects = [];
  for (let i = 0; i < positions.length; i++) {
    for (let j = i + 1; j < positions.length; j++) {
      let d = Math.abs(positions[i].lon - positions[j].lon);
      if (d > 180) d = 360 - d;
      for (const a of ASPECT_DEFS) {
        const orb = Math.abs(d - a.angle);
        if (orb <= a.orb) {
          aspects.push({
            p1: positions[i].name, p2: positions[j].name,
            type: a.name, sym: a.sym, orb: orb.toFixed(2)
          });
        }
      }
    }
  }

  aspects.sort((a, b) => parseFloat(a.orb) - parseFloat(b.orb));

  if (aspects.length === 0) L.push('Аспекты не обнаружены');
  else aspects.forEach(a => L.push(`${a.p1} ${a.type} ${a.p2} (орб ${a.orb}°)`));

  L.push('');
  L.push('══════════════════════════════');

  document.getElementById('output').value = L.join('\n');
  document.getElementById('resultBlock').style.display = 'block';
};

window.copyText = function() {
  const ta = document.getElementById('output');
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Скопировано'; btn.className = 'copy-btn copied';
    setTimeout(() => { btn.textContent = '⎘ Копировать'; btn.className = 'copy-btn'; }, 2500);
  });
};

initSWE();
</script>
</body>
